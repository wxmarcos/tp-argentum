repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
    - id: end-of-file-fixer

- repo: https://github.com/ssciwr/clang-format-hook
  rev: v14.0.0
  hooks:
    - id: clang-format
      files: ^.*\.(cpp|cc|cxx|h|hpp)$
      args: ["--style=file", "-i"]

- repo: https://github.com/cpplint/cpplint
  rev: 1.6.0
  hooks:
    - id: cpplint
      files: ^.*\.(cpp|cc|cxx|h|hpp)$
      args: [
        "--filter=-legal/copyright,-build/header_guard,-readability/todo,-whitespace/indent,-build/c++11,-runtime/references,-build/include_order,-whitespace/blank_line,-build/include_subdir,-build/include_what_you_use,-runtime/threadsafe_fn"
      ]

- repo: https://github.com/pocc/pre-commit-hooks
  rev: 9a9bbc00895bbdb7670231c2565d4f1309c42905
  hooks:
    - id: cppcheck
      files: ^.*\.(cpp|cc|cxx|h|hpp)$
      args: [
        "--inline-suppr",
        "--enable=all",
        "--suppress=missingIncludeSystem",
        "--suppress=missingInclude",
        "--suppress=useStlAlgorithm",
        "--suppress=shadowVariable",
        "--suppress=unusedFunction",
        "--suppress=unmatchedSuppression",
        "--suppress=unusedStructMember",
        "--language=c++",
        "--std=c++20",
        "--error-exitcode=1"
      ]
