# =============================================================================
# Argentum Online — Configuración del juego
# =============================================================================

# -----------------------------------------------------------------------------
# Inventario
# -----------------------------------------------------------------------------
[inventario]
capacidad_max = 30

# -----------------------------------------------------------------------------
# Razas
# -----------------------------------------------------------------------------
[razas.humano]
constitucion_base  = 300
inteligencia_base  = 300
f_raza_vida        = 1.0
f_raza_mana        = 1.0
f_recuperacion     = 1.0

[razas.elfo]
constitucion_base  = 200
inteligencia_base  = 450
f_raza_vida        = 0.8
f_raza_mana        = 1.3
f_recuperacion     = 1.2

[razas.enano]
constitucion_base  = 450
inteligencia_base  = 150
f_raza_vida        = 1.3
f_raza_mana        = 0.7
f_recuperacion     = 0.8

[razas.gnomo]
constitucion_base  = 250
inteligencia_base  = 400
f_raza_vida        = 0.9
f_raza_mana        = 1.2
f_recuperacion     = 0.9

# -----------------------------------------------------------------------------
# Clases
# -----------------------------------------------------------------------------
[clases.guerrero]
f_clase_vida       = 1.5
f_clase_mana       = 0.0
f_clase_meditacion = 0.0

[clases.mago]
f_clase_vida       = 0.8
f_clase_mana       = 1.5
f_clase_meditacion = 2.0

[clases.clerigo]
f_clase_vida       = 1.0
f_clase_mana       = 1.0
f_clase_meditacion = 1.5

[clases.paladin]
f_clase_vida       = 1.3
f_clase_mana       = 0.7
f_clase_meditacion = 1.0

# -----------------------------------------------------------------------------
# Fórmulas
# -----------------------------------------------------------------------------
[formulas]
critico_porcentaje      = 20      # % de probabilidad de golpe crítico
exp_coeficiente         = 1000.0  # LimiteExp = coef * nivel^exp
exp_exponente           = 1.8
oro_max_coeficiente     = 100.0   # OroMax = coef * nivel^exp
oro_max_exponente       = 1.1
oro_drop_npc_divisor    = 10      # OroDropNPC = vidaMaxNPC / divisor

# -----------------------------------------------------------------------------
# Mapas
# -----------------------------------------------------------------------------
[mapas.1]
ancho = 100
alto = 100
vecino_norte = -1
vecino_sur = -1
vecino_este = 2
vecino_oeste = -1

[mapas.2]
ancho = 100
alto = 100
vecino_norte = -1
vecino_sur = -1
vecino_este = -1
vecino_oeste = 1
