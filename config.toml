# =============================================================================
# Argentum Online — Configuración del juego
# =============================================================================

# -----------------------------------------------------------------------------
# Inventario
# -----------------------------------------------------------------------------
[inventario]
capacidad_max = 30

# -----------------------------------------------------------------------------
# Rutas de persisteencia
# -----------------------------------------------------------------------------
[rutas]
ruta_jugadores = "data/players.bin"
ruta_index_jugadores = "data/index.bin"
ruta_clanes = "data/clanes.bin"

# -----------------------------------------------------------------------------
# Razas
# -----------------------------------------------------------------------------
[razas.humano]
constitucion_base  = 25
inteligencia_base  = 25
fuerza_base        = 5
agilidad_base      = 3
f_raza_vida        = 1.0
f_raza_mana        = 1.0
f_recuperacion     = 1.0

[razas.elfo]
constitucion_base  = 18
inteligencia_base  = 35
fuerza_base        = 4
agilidad_base      = 5
f_raza_vida        = 0.8
f_raza_mana        = 1.3
f_recuperacion     = 1.2

[razas.enano]
constitucion_base  = 35
inteligencia_base  = 15
fuerza_base        = 7
agilidad_base      = 1
f_raza_vida        = 1.3
f_raza_mana        = 0.7
f_recuperacion     = 0.8

[razas.gnomo]
constitucion_base  = 22
inteligencia_base  = 30
fuerza_base        = 3
agilidad_base      = 4
f_raza_vida        = 0.9
f_raza_mana        = 1.2
f_recuperacion     = 0.9

# -----------------------------------------------------------------------------
# Clases
# -----------------------------------------------------------------------------
[clases.guerrero]
f_clase_vida       = 1.5
f_clase_mana       = 0.0
f_clase_meditacion = 0.0

[clases.mago]
f_clase_vida       = 0.8
f_clase_mana       = 1.5
f_clase_meditacion = 2.0

[clases.clerigo]
f_clase_vida       = 1.0
f_clase_mana       = 1.0
f_clase_meditacion = 1.5

[clases.paladin]
f_clase_vida       = 1.3
f_clase_mana       = 0.7
f_clase_meditacion = 1.0

# -----------------------------------------------------------------------------
# Fórmulas
# -----------------------------------------------------------------------------
[formulas]
critico_porcentaje      = 20      # % de probabilidad de golpe crítico
exp_penalidad_porcentaje = 5      # % de exp actual que se pierde al morir
exp_coeficiente         = 1000.0  # LimiteExp = coef * nivel^exp
exp_exponente           = 1.8
oro_max_coeficiente     = 100.0   # OroMax = coef * nivel^exp
oro_max_exponente       = 1.1
oro_drop_npc_divisor    = 10      # OroDropNPC = rand(0,1) * vidaMaxNPC / divisor
esquive_umbral          = 0.001   # umbral para calcularEsquive: pow(r, agi) < umbral
exp_nivel_offset        = 10      # offset en factor de exp: max(nivelOtro - nivelPropio + offset, 0)
exp_matar_factor        = 0.1     # factor aleatorio de exp al matar: rand(0,1) * factor * vidaMax * nivelFactor

# -----------------------------------------------------------------------------
# Clan
# -----------------------------------------------------------------------------
[clan]
max_miembros = 16

# -----------------------------------------------------------------------------
# Mundo
# -----------------------------------------------------------------------------
[mundo]
movimiento_cooldown_ms   = 150
max_radio_drop           = 8
penalizacion_mapa_distinto = 50.0

# -----------------------------------------------------------------------------
# IA de criaturas
# -----------------------------------------------------------------------------
[ia]
rango_deteccion_criaturas = 15
cooldown_movimiento_criatura = 2.0  # segundos entre movimientos de criaturas
cooldown_ataque_criatura = 2.0      # segundos entre ataques de criaturas
intervalo_spawn = 30.0  # segundos entre spawns de criaturas
intervalo_persistencia = 60.0  # segundos entre persistencias periódicas
velocidad_resurreccion = 5

# -----------------------------------------------------------------------------
# Criaturas
# -----------------------------------------------------------------------------
[criaturas.goblin]
vida_max  = 25
nivel     = 1
danio_min = 2
danio_max = 4
fuerza    = 1

[criaturas.goblin_jorobado]
vida_max  = 60
nivel     = 2
danio_min = 3
danio_max = 7
fuerza    = 1
 
[criaturas.esqueleto]
vida_max  = 70
nivel     = 2
danio_min = 3
danio_max = 7
fuerza    = 1

[criaturas.esqueleto_hacha]
vida_max  = 100
nivel     = 3
danio_min = 5
danio_max = 10
fuerza    = 2
 
[criaturas.zombie]
vida_max  = 35
nivel     = 1
danio_min = 2
danio_max = 5
fuerza    = 1
 
[criaturas.arana]
vida_max  = 15
nivel     = 1
danio_min = 1
danio_max = 3
fuerza    = 1

[criaturas.arana_blanca]
vida_max  = 50
nivel     = 2
danio_min = 2
danio_max = 6
fuerza    = 1
 
[criaturas.orco]
vida_max  = 140
nivel     = 3
danio_min = 5
danio_max = 12
fuerza    = 2
 
[criaturas.golem]
vida_max  = 250
nivel     = 5
danio_min = 8
danio_max = 20
fuerza    = 3

[criaturas.golem_demoniaco]
vida_max  = 350
nivel     = 7
danio_min = 12
danio_max = 28
fuerza    = 4

# -----------------------------------------------------------------------------
# Comercio — precios de compra (lo que paga el jugador)
# El precio de venta (lo que recibe el jugador) es la mitad
# -----------------------------------------------------------------------------
[precios]
espada             = 40
hacha              = 70
martillo           = 90
arco_simple        = 80
arco_compuesto     = 350
vara_de_fresno     = 120
flauta_elfica      = 300
baculo_nudoso      = 250
baculo_engarzado   = 600
armadura_de_cuero  = 120
armadura_de_placas = 800
tunica_azul        = 220
capucha            = 40
casco_de_hierro    = 120
sombrero_magico    = 300
escudo_de_tortuga  = 30
escudo_de_hierro   = 80
pocion_de_vida     = 25
pocion_de_mana     = 40

# -----------------------------------------------------------------------------
# Servidor
# -----------------------------------------------------------------------------
[server]
map_width = 100
map_height = 100
ticks_per_second = 30
max_clients = 100

