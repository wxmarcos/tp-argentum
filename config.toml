# =============================================================================
# Argentum Online — Configuración del juego
# =============================================================================

# -----------------------------------------------------------------------------
# Rutas de Persistencia
# -----------------------------------------------------------------------------
[rutas]
ruta_jugadores = "data/players.toml"
ruta_npcs_criaturas = "data/npcs_criaturas.toml"

# -----------------------------------------------------------------------------
# Inventario
# -----------------------------------------------------------------------------
[inventario]
capacidad_max = 30

# -----------------------------------------------------------------------------
# Razas
# -----------------------------------------------------------------------------
[razas.humano]
constitucion_base  = 300
inteligencia_base  = 300
fuerza_base        = 300
agilidad_base      = 300
f_raza_vida        = 1.0
f_raza_mana        = 1.0
f_recuperacion     = 1.0

[razas.elfo]
constitucion_base  = 200
inteligencia_base  = 450
fuerza_base        = 250
agilidad_base      = 450
f_raza_vida        = 0.8
f_raza_mana        = 1.3
f_recuperacion     = 1.2

[razas.enano]
constitucion_base  = 450
inteligencia_base  = 150
fuerza_base        = 400
agilidad_base      = 200
f_raza_vida        = 1.3
f_raza_mana        = 0.7
f_recuperacion     = 0.8

[razas.gnomo]
constitucion_base  = 250
inteligencia_base  = 400
fuerza_base        = 200
agilidad_base      = 350
f_raza_vida        = 0.9
f_raza_mana        = 1.2
f_recuperacion     = 0.9

# -----------------------------------------------------------------------------
# Clases
# -----------------------------------------------------------------------------
[clases.guerrero]
f_clase_vida       = 1.5
f_clase_mana       = 0.0
f_clase_meditacion = 0.0

[clases.mago]
f_clase_vida       = 0.8
f_clase_mana       = 1.5
f_clase_meditacion = 2.0

[clases.clerigo]
f_clase_vida       = 1.0
f_clase_mana       = 1.0
f_clase_meditacion = 1.5

[clases.paladin]
f_clase_vida       = 1.3
f_clase_mana       = 0.7
f_clase_meditacion = 1.0

# -----------------------------------------------------------------------------
# Fórmulas
# -----------------------------------------------------------------------------
[formulas]
critico_porcentaje      = 20      # % de probabilidad de golpe crítico
exp_coeficiente         = 1000.0  # LimiteExp = coef * nivel^exp
exp_exponente           = 1.8
oro_max_coeficiente     = 100.0   # OroMax = coef * nivel^exp
oro_max_exponente       = 1.1
oro_drop_npc_divisor    = 10      # OroDropNPC = vidaMaxNPC / divisor

# -----------------------------------------------------------------------------
# IA de criaturas
# -----------------------------------------------------------------------------
[ia]
rango_deteccion_criaturas = 15
cooldown_movimiento_criaturas = 2.0  # ms entre movimientos de criaturas
cooldown_ataque_criaturas = 2.0      # ms entre ataques de criaturas
intervalo_spawn = 30.0  # segundos entre spawns de criaturas
velocidad_resurreccion = 0.5

# -----------------------------------------------------------------------------
# Criaturas
# -----------------------------------------------------------------------------
[criaturas.goblin]
vida_max  = 50
nivel     = 1
danio_min = 2
danio_max = 5
fuerza    = 1
 
[criaturas.esqueleto]
vida_max  = 60
nivel     = 2
danio_min = 3
danio_max = 7
fuerza    = 1
 
[criaturas.zombie]
vida_max  = 80
nivel     = 1
danio_min = 2
danio_max = 6
fuerza    = 1
 
[criaturas.arana]
vida_max  = 40
nivel     = 1
danio_min = 1
danio_max = 4
fuerza    = 1
 
[criaturas.orco]
vida_max  = 150
nivel     = 3
danio_min = 5
danio_max = 12
fuerza    = 2
 
[criaturas.golem]
vida_max  = 250
nivel     = 5
danio_min = 8
danio_max = 20
fuerza    = 3

# -----------------------------------------------------------------------------
# Servidor
# -----------------------------------------------------------------------------
[server]
map_width = 100
map_height = 100
ticks_per_second = 30
max_clients = 100

# -----------------------------------------------------------------------------
# Mapas
# -----------------------------------------------------------------------------
[mapas.1]
ancho              = 100
alto               = 100
vecino_norte       = 3
vecino_sur         = -1
vecino_este        = 2
vecino_oeste       = -1
es_zona_segura     = false
poblacion_max      = 10
criaturas_posibles = ["goblin", "arana", "zombie"]
sacerdotes         = []
portales           = [{x = 50, y = 50, mapa_destino = 4, destino_x = 5, destino_y = 5}]
 
[mapas.2]
ancho              = 100
alto               = 100
vecino_norte       = -1
vecino_sur         = -1
vecino_este        = -1
vecino_oeste       = 1
es_zona_segura     = false
poblacion_max      = 8
criaturas_posibles = ["orco", "golem", "esqueleto"]
sacerdotes         = []
portales           = []

[mapas.3]
ancho              = 100
alto               = 100
vecino_norte       = -1
vecino_sur         = 1
vecino_este        = -1
vecino_oeste       = -1
es_zona_segura     = true
poblacion_max      = 0
criaturas_posibles = []
sacerdotes         = [{x = 50, y = 50}]
portales           = []

[mapas.4]
ancho              = 100
alto               = 100
vecino_norte       = -1
vecino_sur         = -1
vecino_este        = -1
vecino_oeste       = -1
es_zona_segura     = false
poblacion_max      = 5
criaturas_posibles = ["orco", "golem"]
sacerdotes         = []
portales           = [{x = 1, y = 1, mapa_destino = 1, destino_x = 51, destino_y = 50}]
